<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Wallet — Give your AI agent a wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif:opsz@12..24&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --cream:#F8F5F2;--cream-dark:#F0ECE8;--black:#0A0A0A;
      --gray:#888880;--gray-light:#C8C4BE;--violet:#725BFF;
      --violet-hover:#5B44E8;--border:#E2DDD8;
      --dark-bg:#2A2825;--dark-text:#F8F5F2;
    }
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--black);font-size:16px;line-height:1.6;overflow-x:hidden}
    span[style*="inline-flex"] svg{display:block;width:100%!important;height:100%!important}

    nav{position:sticky;top:0;z-index:100;background:var(--cream);border-bottom:1px solid var(--border);padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--black);font-weight:500;font-size:15px;letter-spacing:-0.02em}
    .nav-logo-icon{width:28px;height:28px;background:var(--black);border-radius:6px;display:flex;align-items:center;justify-content:center}
    .nav-logo-icon svg{width:16px;height:16px}
    .nav-links{display:flex;align-items:center;gap:32px;list-style:none}
    .nav-links a{text-decoration:none;color:var(--black);font-size:14px;opacity:0.7;transition:opacity 0.2s=
    .nav-links a:hover{opacity:1}
    .nav-cta{background:transparent;border:1.5px solid var(--black);color:var(--black)!important;padding:8px 20px;border-radius:40px;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;opacity:1!important;transition:background 0.2s,color 0.2s}
